name: Trace Validation Failure
description: Report a run directory that fails validate_harness_trace.py.
title: "[Trace]: "
labels: ["trace", "validation"]
body:
  - type: textarea
    id: command
    attributes:
      label: Validator Command
      render: bash
      placeholder: "python3 scripts/validate_harness_trace.py runs/example/001"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Validator Output
      render: text
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Run Directory Shape
      description: Paste `find <run_dir> -maxdepth 1 -type f -printf '%f\n' | sort`.
      render: text
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Should the trace pass, or is the validator error unclear?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Mention runtime subagent mode, inline fallback reason, or auto_harness status if relevant.
